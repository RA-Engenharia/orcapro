  <!-- PWA: instala o OrçaPRO como aplicativo (ícone + tela cheia + abre offline) -->
  <script>
  (function () {
    if ('serviceWorker' in navigator) { window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); }); }
    var deferIns = null;
    function standalone() { try { return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone; } catch (e) { return false; } }
    function mostra() {
      if (standalone() || document.getElementById('opr-install')) return;
      var b = document.createElement('button');
      b.id = 'opr-install'; b.type = 'button'; b.textContent = '📲 Instalar app';
      b.title = 'Instalar o OrçaPRO como aplicativo';
      b.style.cssText = 'position:fixed;right:16px;bottom:16px;z-index:99999;background:#16a34a;color:#fff;border:0;border-radius:99px;padding:11px 18px;font:700 14px/1 Inter,system-ui,Arial,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.28);cursor:pointer';
      b.onclick = function () { if (deferIns) { deferIns.prompt(); deferIns = null; b.remove(); } };
      document.body.appendChild(b);
    }
    window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); deferIns = e; mostra(); });
    window.addEventListener('appinstalled', function () { var b = document.getElementById('opr-install'); if (b) b.remove(); });
  })();
  </script>
</body>
</html>
