  <!-- PWA: instala o OrçaPRO como aplicativo (ícone + tela cheia + abre offline) -->
  <script>
  (function () {
    if ('serviceWorker' in navigator) { window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); }); }
    var deferIns = null;
    function standalone() { try { return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone; } catch (e) { return false; } }
    function mostra() {
      if (standalone() || document.getElementById('opr-install')) return;
      try { if (localStorage.getItem('opr_install_dismiss')) return; } catch (e) {}
      var wrap = document.createElement('div');
      wrap.id = 'opr-install';
      wrap.style.cssText = 'position:fixed;right:18px;bottom:18px;z-index:99999;display:flex;align-items:center;background:#0f2740;color:#eaf2fa;border:1px solid rgba(255,255,255,.14);border-radius:12px;box-shadow:0 12px 32px rgba(8,18,30,.42);font:600 13px/1 Inter,system-ui,Arial,sans-serif;overflow:hidden';
      var b = document.createElement('button');
      b.type = 'button'; b.innerHTML = '<span style="color:#6fd08a;font-size:15px">⬇️</span> Instalar como app';
      b.title = 'Instalar o OrçaPRO IA como aplicativo';
      b.style.cssText = 'background:none;border:0;color:inherit;font:inherit;font-weight:700;padding:12px 10px 12px 16px;cursor:pointer;white-space:nowrap';
      b.onclick = function () { if (deferIns) { deferIns.prompt(); deferIns = null; wrap.remove(); } };
      var x = document.createElement('button');
      x.type = 'button'; x.textContent = '✕'; x.title = 'Agora não';
      x.style.cssText = 'background:none;border:0;color:#7f93a8;font-size:13px;padding:12px 14px 12px 8px;cursor:pointer';
      x.onclick = function () { try { localStorage.setItem('opr_install_dismiss', '1'); } catch (e) {} wrap.remove(); };
      wrap.appendChild(b); wrap.appendChild(x);
      document.body.appendChild(wrap);
    }
    window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); deferIns = e; mostra(); });
    window.addEventListener('appinstalled', function () { var w = document.getElementById('opr-install'); if (w) w.remove(); });
  })();
  </script>
